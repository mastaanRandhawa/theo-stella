<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Theo·Stella Beauty Bar — Surrey's home for Russian manicures, Gel-X extensions, permanent makeup, lashes, brows and skin care. A calm, luxurious escape."
    />
    <meta name="theme-color" content="#2b1d24" />

    <!-- Open Graph -->
    <meta property="og:title" content="Theo·Stella Beauty Bar" />
    <meta
      property="og:description"
      content="Luxury Russian manicures, Gel-X, permanent makeup, lashes & brows in Surrey, BC."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <title>Theo·Stella Beauty Bar — Surrey Nail & Beauty Studio</title>
  </head>
  <body>
    <div id="root">
      <!-- Instant on-brand first paint; React replaces this on mount -->
      <style>
        @keyframes ts-spin { to { transform: rotate(360deg); } }
      </style>
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 1.25rem;
          background: radial-gradient(120% 90% at 50% 0%, #fbe3e6 0%, #f9d9dd 22%, #faf3ef 60%);
          font-family: 'Cormorant Garamond', Georgia, serif;
          color: #3b2d30;
        "
      >
        <div style="font-size: 2.25rem; letter-spacing: 0.01em">
          Theo<span style="color: #e5a2ac">·</span>Stella
        </div>
        <div
          style="
            width: 34px;
            height: 34px;
            border-radius: 9999px;
            border: 2px solid rgba(201, 135, 149, 0.3);
            border-top-color: #e5a2ac;
            animation: ts-spin 0.8s linear infinite;
          "
        ></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
